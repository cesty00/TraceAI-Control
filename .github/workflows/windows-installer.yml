name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/**"
      - "installer/windows/**"
      - ".github/workflows/windows-installer.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONPATH: ${{ github.workspace }}

jobs:
  build-windows-installer:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show workspace diagnostics
        shell: pwsh
        run: |
          Write-Host "Workspace: $env:GITHUB_WORKSPACE"
          Get-ChildItem -Force
          Get-ChildItem -Force installer\windows
          python --version
          python -c "import sys; print(sys.executable); print(sys.path)"

      - name: Install Python build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pyinstaller python-docx openpyxl pandas
          python -m pip list

      - name: Check Python imports
        shell: pwsh
        run: |
          python -c "import pytest, docx, openpyxl, pandas; print('Python dependencies OK')"
          python -c "import src.ui.visual; print('TraceAI visual UI import OK')"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress
          if (Test-Path "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe") { & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /? | Select-Object -First 5 }

      - name: Run test suite diagnostics
        shell: pwsh
        continue-on-error: true
        run: |
          python -m pytest -q

      - name: Build PyInstaller executable
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\installer\windows\build_windows.ps1 -SkipTests -AppVersion 0.5.0 -BuildChannel github-actions-installer -BuildCommit $env:GITHUB_SHA

      - name: Verify PyInstaller executable
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\installer\windows\verify_windows_build.ps1 -ExpectedCommit $env:GITHUB_SHA

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\installer\windows\build_inno_setup.ps1

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: TraceAI-Control-Windows-Installer
          path: installer/windows/output/TraceAI-Control-Setup.exe
          if-no-files-found: error

      - name: Upload PyInstaller folder artifact
        uses: actions/upload-artifact@v4
        with:
          name: TraceAI-Control-PyInstaller-Folder
          path: dist/TraceAI-Control
          if-no-files-found: error
