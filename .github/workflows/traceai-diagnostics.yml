name: TraceAI Diagnostics

on:
  workflow_dispatch:
    inputs:
      source_directory:
        description: "Optional source data directory inside repository"
        required: false
        default: ""
      code:
        description: "Article code"
        required: false
        default: "DS099903883"
      lot:
        description: "Lot"
        required: false
        default: "105.26"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "samples/**"
      - ".github/workflows/traceai-diagnostics.yml"

permissions:
  contents: read

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  diagnostics:
    name: Tests and diagnostic report
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest python-docx openpyxl pandas
          python --version
          python -m pip list

      - name: Run pytest
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force diagnostics | Out-Null
          python -m pytest -q 2>&1 | Tee-Object -FilePath diagnostics\pytest-output.txt

      - name: Generate controlled demo DOCX
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force diagnostics | Out-Null
          python samples\demo_docx_runner.py --output diagnostics\demo_traceability_report.docx

      - name: Locate and normalize real source directory
        id: source-dir
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force diagnostics | Out-Null
          $manual = "${{ github.event.inputs.source_directory }}"
          $root = (Get-Location).Path
          $zipExtractRoot = Join-Path $root "diagnostics\unzipped-sources"
          New-Item -ItemType Directory -Force $zipExtractRoot | Out-Null

          function Find-FileInDirectory($directory, $names) {
            foreach ($name in $names) {
              $path = Join-Path $directory $name
              if (Test-Path $path) { return $path }
            }
            return ""
          }

          function Try-UseDirectory($directory) {
            if (-not $directory -or -not (Test-Path $directory)) { return $false }
            $wms = Find-FileInDirectory $directory @("trasabilitate_wms.csv")
            $prd = Find-FileInDirectory $directory @("rapoarte productie.csv", "raport_productie.csv", "rapoarte_productie.csv")
            $nomenclator = Find-FileInDirectory $directory @("nomenclator.xlsx")
            $stock = Find-FileInDirectory $directory @("stoc la moment original.xlsx", "stoc_la_moment_original.xlsx")
            return [bool]($wms -and $prd -and $nomenclator -and $stock)
          }

          $candidateDirectories = @()
          if ($manual -and (Test-Path $manual)) { $candidateDirectories += (Resolve-Path $manual).Path }
          $candidateDirectories += @(
            "data",
            "date",
            "input",
            "inputs",
            "sources",
            "surse",
            "samples\data",
            "samples\date",
            "samples\input",
            "tests\data",
            "tests\fixtures",
            "fixtures",
            "."
          ) | Where-Object { Test-Path $_ } | ForEach-Object { (Resolve-Path $_).Path }

          $interestingNames = @(
            "trasabilitate_wms.csv",
            "trasabilitate_wms.zip",
            "rapoarte productie.csv",
            "raport_productie.csv",
            "rapoarte_productie.csv",
            "nomenclator.xlsx",
            "stoc la moment original.xlsx",
            "stoc_la_moment_original.xlsx"
          )
          $foundFiles = Get-ChildItem -Path $root -Recurse -File -ErrorAction SilentlyContinue |
            Where-Object { $interestingNames -contains $_.Name } |
            Select-Object FullName, DirectoryName, Name
          $foundFiles | Format-Table -AutoSize | Out-String | Set-Content -Path diagnostics\source-files-found.txt -Encoding UTF8

          $zipFiles = $foundFiles | Where-Object { $_.Name -eq "trasabilitate_wms.zip" }
          $zipIndex = 0
          foreach ($zip in $zipFiles) {
            $zipIndex += 1
            $destination = Join-Path $zipExtractRoot "wms-$zipIndex"
            New-Item -ItemType Directory -Force $destination | Out-Null
            Expand-Archive -Path $zip.FullName -DestinationPath $destination -Force
            $candidateDirectories += $destination
            $csvInside = Get-ChildItem -Path $destination -Recurse -File -Filter "trasabilitate_wms.csv" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($csvInside) { $candidateDirectories += $csvInside.DirectoryName }
          }

          $candidateDirectories += ($foundFiles | Select-Object -ExpandProperty DirectoryName -Unique)
          $candidateDirectories = $candidateDirectories | Where-Object { $_ } | Select-Object -Unique

          $selected = ""
          foreach ($candidate in $candidateDirectories) {
            if (Try-UseDirectory $candidate) {
              $selected = $candidate
              break
            }
          }

          $normalized = ""
          if ($selected) {
            $normalized = Join-Path $root "diagnostics\real-source"
            New-Item -ItemType Directory -Force $normalized | Out-Null
            Copy-Item (Find-FileInDirectory $selected @("trasabilitate_wms.csv")) (Join-Path $normalized "trasabilitate_wms.csv") -Force
            Copy-Item (Find-FileInDirectory $selected @("rapoarte productie.csv", "raport_productie.csv", "rapoarte_productie.csv")) (Join-Path $normalized "rapoarte productie.csv") -Force
            Copy-Item (Find-FileInDirectory $selected @("nomenclator.xlsx")) (Join-Path $normalized "nomenclator.xlsx") -Force
            Copy-Item (Find-FileInDirectory $selected @("stoc la moment original.xlsx", "stoc_la_moment_original.xlsx")) (Join-Path $normalized "stoc la moment original.xlsx") -Force
            "Selected source directory: $selected`nNormalized source directory: $normalized" | Tee-Object -FilePath diagnostics\source-directory.txt
          } else {
            "No complete source directory found. The workflow searched recursively for official, underscore and zipped WMS source variants." | Tee-Object -FilePath diagnostics\source-directory.txt
          }

          "selected=$normalized" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Generate independent reference extraction when data is available
        if: steps.source-dir.outputs.selected != ''
        shell: pwsh
        run: |
          $code = "${{ github.event.inputs.code }}"
          $lot = "${{ github.event.inputs.lot }}"
          if (-not $code) { $code = "DS099903883" }
          if (-not $lot) { $lot = "105.26" }
          python samples\extract_reference_traceability.py "${{ steps.source-dir.outputs.selected }}" --code $code --lot $lot --output diagnostics\reference_traceability.md --json-output diagnostics\reference_traceability.json

      - name: Generate real diagnostic DOCX when data is available
        if: steps.source-dir.outputs.selected != ''
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force diagnostics | Out-Null
          $code = "${{ github.event.inputs.code }}"
          $lot = "${{ github.event.inputs.lot }}"
          if (-not $code) { $code = "DS099903883" }
          if (-not $lot) { $lot = "105.26" }
          python -m src.report.docx_minimal "${{ steps.source-dir.outputs.selected }}" --code $code --lot $lot --output diagnostics\real_traceability_report.docx

      - name: Write diagnostic summary
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force diagnostics | Out-Null
          @"
          # TraceAI Diagnostics

          Commit: $env:GITHUB_SHA
          Workflow: $env:GITHUB_WORKFLOW
          Code: ${{ github.event.inputs.code }}
          Lot: ${{ github.event.inputs.lot }}

          ## Artifacts
          - pytest-output.txt
          - demo_traceability_report.docx
          - reference_traceability.md/json, only if complete source data was found
          - real_traceability_report.docx, only if complete source data was found
          - source-directory.txt
          - source-files-found.txt

          ## Source data rule
          The workflow accepts these source names and normalizes them at runtime:
          - trasabilitate_wms.csv OR trasabilitate_wms.zip containing trasabilitate_wms.csv
          - rapoarte productie.csv OR raport_productie.csv OR rapoarte_productie.csv
          - nomenclator.xlsx
          - stoc la moment original.xlsx OR stoc_la_moment_original.xlsx
          "@ | Set-Content -Path diagnostics\diagnostic-summary.md -Encoding UTF8

      - name: Upload diagnostics artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TraceAI-Diagnostics
          path: diagnostics/**
          if-no-files-found: warn
