name: TraceAI Diagnostics

on:
  workflow_dispatch:
    inputs:
      source_directory:
        description: "Optional source data directory inside repository"
        required: false
        default: ""
      code:
        description: "Article code"
        required: false
        default: "DS099903883"
      lot:
        description: "Lot"
        required: false
        default: "105.26"
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/**"
      - "samples/**"
      - ".github/workflows/traceai-diagnostics.yml"
      - "*.csv"
      - "*.xlsx"
      - "*.zip"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "samples/**"
      - ".github/workflows/traceai-diagnostics.yml"

permissions:
  contents: read

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  diagnostics:
    name: Tests and diagnostic report
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest python-docx openpyxl pandas
          python --version
          python -m pip list

      - name: Run pytest
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force diagnostics | Out-Null
          python -m pytest -q 2>&1 | Tee-Object -FilePath diagnostics\pytest-output.txt

      - name: Generate controlled demo DOCX
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force diagnostics | Out-Null
          python samples\demo_docx_runner.py --output diagnostics\demo_traceability_report.docx

      - name: Locate and normalize real source files
        id: source-dir
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force diagnostics | Out-Null
          $manual = "${{ github.event.inputs.source_directory }}"
          $root = (Get-Location).Path
          $zipExtractRoot = Join-Path $root "diagnostics\unzipped-sources"
          New-Item -ItemType Directory -Force $zipExtractRoot | Out-Null

          function Find-FirstFile($files, $names) {
            foreach ($name in $names) {
              $match = $files | Where-Object { $_.Name -eq $name } | Select-Object -First 1
              if ($match) { return $match.FullName }
            }
            return ""
          }

          $searchRoots = @($root)
          if ($manual -and (Test-Path $manual)) { $searchRoots = @((Resolve-Path $manual).Path) + $searchRoots }
          $searchRoots = $searchRoots | Select-Object -Unique

          $interestingNames = @(
            "trasabilitate_wms.csv",
            "trasabilitate_wms.zip",
            "rapoarte productie.csv",
            "raport_productie.csv",
            "rapoarte_productie.csv",
            "nomenclator.xlsx",
            "stoc la moment original.xlsx",
            "stoc_la_moment_original.xlsx"
          )

          $foundFiles = @()
          foreach ($searchRoot in $searchRoots) {
            $foundFiles += Get-ChildItem -Path $searchRoot -Recurse -File -ErrorAction SilentlyContinue |
              Where-Object { $interestingNames -contains $_.Name }
          }
          $foundFiles = $foundFiles | Sort-Object FullName -Unique
          $foundFiles | Select-Object FullName, DirectoryName, Name | Format-Table -AutoSize | Out-String | Set-Content -Path diagnostics\source-files-found.txt -Encoding UTF8

          $zipFiles = $foundFiles | Where-Object { $_.Name -eq "trasabilitate_wms.zip" }
          $zipIndex = 0
          foreach ($zip in $zipFiles) {
            $zipIndex += 1
            $destination = Join-Path $zipExtractRoot "wms-$zipIndex"
            New-Item -ItemType Directory -Force $destination | Out-Null
            Expand-Archive -Path $zip.FullName -DestinationPath $destination -Force
            $foundFiles += Get-ChildItem -Path $destination -Recurse -File -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -eq "trasabilitate_wms.csv" }
          }
          $foundFiles = $foundFiles | Sort-Object FullName -Unique
          $foundFiles | Select-Object FullName, DirectoryName, Name | Format-Table -AutoSize | Out-String | Set-Content -Path diagnostics\source-files-found-after-unzip.txt -Encoding UTF8

          $wms = Find-FirstFile $foundFiles @("trasabilitate_wms.csv")
          $prd = Find-FirstFile $foundFiles @("rapoarte productie.csv", "raport_productie.csv", "rapoarte_productie.csv")
          $nomenclator = Find-FirstFile $foundFiles @("nomenclator.xlsx")
          $stock = Find-FirstFile $foundFiles @("stoc la moment original.xlsx", "stoc_la_moment_original.xlsx")

          $normalized = ""
          if ($wms -and $prd -and $nomenclator -and $stock) {
            $normalized = Join-Path $root "diagnostics\real-source"
            New-Item -ItemType Directory -Force $normalized | Out-Null
            Copy-Item $wms (Join-Path $normalized "trasabilitate_wms.csv") -Force
            Copy-Item $prd (Join-Path $normalized "rapoarte productie.csv") -Force
            Copy-Item $nomenclator (Join-Path $normalized "nomenclator.xlsx") -Force
            Copy-Item $stock (Join-Path $normalized "stoc la moment original.xlsx") -Force
            @"
Selected individual source files:
WMS: $wms
PRD: $prd
Nomenclator: $nomenclator
Stock: $stock
Normalized source directory: $normalized
"@ | Tee-Object -FilePath diagnostics\source-directory.txt
          } else {
            @"
No complete source set found after recursive search and ZIP extraction.
WMS: $wms
PRD: $prd
Nomenclator: $nomenclator
Stock: $stock
"@ | Tee-Object -FilePath diagnostics\source-directory.txt
          }

          "selected=$normalized" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Generate independent reference extraction when data is available
        if: steps.source-dir.outputs.selected != ''
        shell: pwsh
        run: |
          $code = "${{ github.event.inputs.code }}"
          $lot = "${{ github.event.inputs.lot }}"
          if (-not $code) { $code = "DS099903883" }
          if (-not $lot) { $lot = "105.26" }
          python samples\extract_reference_traceability.py "${{ steps.source-dir.outputs.selected }}" --code $code --lot $lot --output diagnostics\reference_traceability.md --json-output diagnostics\reference_traceability.json

      - name: Generate real diagnostic DOCX when data is available
        if: steps.source-dir.outputs.selected != ''
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force diagnostics | Out-Null
          $code = "${{ github.event.inputs.code }}"
          $lot = "${{ github.event.inputs.lot }}"
          if (-not $code) { $code = "DS099903883" }
          if (-not $lot) { $lot = "105.26" }
          python -m src.report.docx_minimal "${{ steps.source-dir.outputs.selected }}" --code $code --lot $lot --output diagnostics\real_traceability_report.docx

      - name: Write diagnostic summary
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force diagnostics | Out-Null
          @"
          # TraceAI Diagnostics

          Commit: $env:GITHUB_SHA
          Workflow: $env:GITHUB_WORKFLOW
          Code: ${{ github.event.inputs.code }}
          Lot: ${{ github.event.inputs.lot }}

          ## Artifacts
          - pytest-output.txt
          - demo_traceability_report.docx
          - reference_traceability.md/json, only if complete source data was found
          - real_traceability_report.docx, only if complete source data was found
          - source-directory.txt
          - source-files-found.txt
          - source-files-found-after-unzip.txt

          ## Source data rule
          The workflow accepts these source names and normalizes them at runtime:
          - trasabilitate_wms.csv OR trasabilitate_wms.zip containing trasabilitate_wms.csv
          - rapoarte productie.csv OR raport_productie.csv OR rapoarte_productie.csv
          - nomenclator.xlsx
          - stoc la moment original.xlsx OR stoc_la_moment_original.xlsx
          "@ | Set-Content -Path diagnostics\diagnostic-summary.md -Encoding UTF8

      - name: Upload diagnostics artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TraceAI-Diagnostics
          path: |
            diagnostics/pytest-output.txt
            diagnostics/demo_traceability_report.docx
            diagnostics/reference_traceability.md
            diagnostics/reference_traceability.json
            diagnostics/real_traceability_report.docx
            diagnostics/source-directory.txt
            diagnostics/source-files-found.txt
            diagnostics/source-files-found-after-unzip.txt
            diagnostics/diagnostic-summary.md
          if-no-files-found: warn
