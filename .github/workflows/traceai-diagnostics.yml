name: TraceAI Diagnostics

on:
  workflow_dispatch:
    inputs:
      source_directory:
        description: "Optional source data directory inside repository"
        required: false
        default: ""
      code:
        description: "Article code"
        required: false
        default: "DS099903883"
      lot:
        description: "Lot"
        required: false
        default: "105.26"
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/**"
      - "samples/**"
      - "installer/windows/**"
      - ".github/workflows/traceai-diagnostics.yml"
      - "CHECKPOINT.md"
      - "README.md"
      - "*.csv"
      - "*.xlsx"
      - "*.zip"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "samples/**"
      - "installer/windows/**"
      - ".github/workflows/traceai-diagnostics.yml"
      - "CHECKPOINT.md"
      - "README.md"

permissions:
  contents: read

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  smoke_pr:
    name: Focused renderer smoke
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest python-docx openpyxl pandas
          python --version

      - name: Run focused pytest
        id: pytest
        shell: bash
        run: |
          mkdir -p diagnostics
          set -o pipefail
          python -m pytest -q tests/test_audit_checklist_docx.py tests/test_audit_checklist_ui_json.py 2>&1 | tee diagnostics/pytest-output.txt

      - name: Generate focused 01E-3 evidence
        if: success()
        shell: bash
        run: |
          mkdir -p diagnostics
          python - <<'PY'
          import json
          from pathlib import Path

          from src.audit.audit_checklist_report import build_audit_checklist_report
          from src.audit.audit_traceability_report import build_audit_traceability_report
          from src.report.audit_checklist_docx import build_document_xml
          from src.ui.audit_checklist_json import audit_checklist_ui_payload_from_report
          from tests.test_audit_traceability_report import make_case

          approved = "Rezumatul de conformare arată dacă raportul conține informațiile necesare pentru verificarea trasabilității. Observațiile explică limitele datelor sau verificările care trebuie completate manual."
          report = build_audit_checklist_report(build_audit_traceability_report(make_case()))
          xml = build_document_xml(report)
          payload = audit_checklist_ui_payload_from_report(
              report,
              data_quality={
                  "status": "WARNING",
                  "source_count": 4,
                  "sources_found": 4,
                  "error_count": 0,
                  "warning_count": 2,
                  "issue_count": 2,
              },
          )

          Path("diagnostics/pr83_conformity_docx.xml.txt").write_text(xml, encoding="utf-8")
          Path("diagnostics/pr83_conformity_ui.json").write_text(
              json.dumps(payload, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          Path("diagnostics/pr83_approved_text.txt").write_text(approved, encoding="utf-8")

          assert approved in xml
          sections = {section["key"]: section for section in payload["sections"]}
          assert sections["conformity"]["description"] == approved
          PY

      - name: Write smoke summary
        if: always()
        shell: bash
        run: |
          mkdir -p diagnostics
          {
            echo "# TraceAI Diagnostics";
            echo "";
            echo "## Focused PR smoke";
            echo "- Workflow path: .github/workflows/traceai-diagnostics.yml";
            echo "- Runner: ubuntu-latest";
            echo "- Target: REPORT-QUALITY-01E-3 renderer-only validation";
            echo "- Pytest step outcome: ${{ steps.pytest.outcome }}";
            echo "- Focused tests: tests/test_audit_checklist_docx.py tests/test_audit_checklist_ui_json.py";
            echo "- Evidence artifacts: pr83_conformity_docx.xml.txt, pr83_conformity_ui.json, pr83_approved_text.txt";
          } > diagnostics/diagnostic-summary.md

      - name: Upload smoke diagnostics artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TraceAI-Diagnostics
          path: |
            diagnostics/pytest-output.txt
            diagnostics/diagnostic-summary.md
            diagnostics/pr83_conformity_docx.xml.txt
            diagnostics/pr83_conformity_ui.json
            diagnostics/pr83_approved_text.txt
          if-no-files-found: warn

  diagnostics:
    name: Tests and diagnostic report
    if: github.event_name != 'pull_request'
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest python-docx openpyxl pandas
          python --version

      - name: Run pytest
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force diagnostics | Out-Null
          python -m pytest -q 2>&1 | Tee-Object -FilePath diagnostics\pytest-output.txt

      - name: Generate controlled demo DOCX
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force diagnostics | Out-Null
          python samples\demo_docx_runner.py --output diagnostics\demo_traceability_report.docx

      - name: Locate and normalize real source files
        id: source-dir
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force diagnostics | Out-Null
          $manual = "${{ github.event.inputs.source_directory }}"
          $root = (Get-Location).Path
          $zipExtractRoot = Join-Path $root "diagnostics\unzipped-sources"
          New-Item -ItemType Directory -Force $zipExtractRoot | Out-Null

          function Find-FirstFile($files, $names) {
            foreach ($name in $names) {
              $match = $files | Where-Object { $_.Name -eq $name } | Select-Object -First 1
              if ($match) { return $match.FullName }
            }
            return ""
          }

          $searchRoots = @($root)
          if ($manual -and (Test-Path $manual)) { $searchRoots = @((Resolve-Path $manual).Path) + $searchRoots }
          $searchRoots = $searchRoots | Select-Object -Unique

          $interestingNames = @(
            "trasabilitate_wms.csv",
            "trasabilitate_wms.zip",
            "rapoarte productie.csv",
            "raport_productie.csv",
            "rapoarte_productie.csv",
            "nomenclator.xlsx",
            "stoc la moment original.xlsx",
            "stoc_la_moment_original.xlsx"
          )

          $foundFiles = @()
          foreach ($searchRoot in $searchRoots) {
            $foundFiles += Get-ChildItem -Path $searchRoot -Recurse -File -ErrorAction SilentlyContinue | Where-Object { $interestingNames -contains $_.Name }
          }
          $foundFiles = $foundFiles | Sort-Object FullName -Unique
          $foundFiles | Select-Object FullName, DirectoryName, Name | Format-Table -AutoSize | Out-String | Set-Content -Path diagnostics\source-files-found.txt -Encoding UTF8

          $zipFiles = $foundFiles | Where-Object { $_.Name -eq "trasabilitate_wms.zip" }
          $zipIndex = 0
          foreach ($zip in $zipFiles) {
            $zipIndex += 1
            $destination = Join-Path $zipExtractRoot "wms-$zipIndex"
            New-Item -ItemType Directory -Force $destination | Out-Null
            Expand-Archive -Path $zip.FullName -DestinationPath $destination -Force
            $foundFiles += Get-ChildItem -Path $destination -Recurse -File -ErrorAction SilentlyContinue | Where-Object { $_.Name -eq "trasabilitate_wms.csv" }
          }
          $foundFiles = $foundFiles | Sort-Object FullName -Unique
          $foundFiles | Select-Object FullName, DirectoryName, Name | Format-Table -AutoSize | Out-String | Set-Content -Path diagnostics\source-files-found-after-unzip.txt -Encoding UTF8

          $wms = Find-FirstFile $foundFiles @("trasabilitate_wms.csv")
          $prd = Find-FirstFile $foundFiles @("rapoarte productie.csv", "raport_productie.csv", "rapoarte_productie.csv")
          $nomenclator = Find-FirstFile $foundFiles @("nomenclator.xlsx")
          $stock = Find-FirstFile $foundFiles @("stoc la moment original.xlsx", "stoc_la_moment_original.xlsx")

          $normalized = ""
          $sourceInfo = @()
          if ($wms -and $prd -and $nomenclator -and $stock) {
            $normalized = Join-Path $root "diagnostics\real-source"
            New-Item -ItemType Directory -Force $normalized | Out-Null
            Copy-Item $wms (Join-Path $normalized "trasabilitate_wms.csv") -Force
            Copy-Item $prd (Join-Path $normalized "rapoarte productie.csv") -Force
            Copy-Item $nomenclator (Join-Path $normalized "nomenclator.xlsx") -Force
            Copy-Item $stock (Join-Path $normalized "stoc la moment original.xlsx") -Force
            $sourceInfo += "Selected individual source files:"
            $sourceInfo += "WMS: $wms"
            $sourceInfo += "PRD: $prd"
            $sourceInfo += "Nomenclator: $nomenclator"
            $sourceInfo += "Stock: $stock"
            $sourceInfo += "Normalized source directory: $normalized"
          } else {
            $sourceInfo += "No complete source set found after recursive search and ZIP extraction."
            $sourceInfo += "WMS: $wms"
            $sourceInfo += "PRD: $prd"
            $sourceInfo += "Nomenclator: $nomenclator"
            $sourceInfo += "Stock: $stock"
          }
          $sourceInfo | Set-Content -Path diagnostics\source-directory.txt -Encoding UTF8
          "selected=$normalized" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Discover representative traceability cases
        if: steps.source-dir.outputs.selected != ''
        continue-on-error: true
        shell: pwsh
        run: |
          python samples\discover_traceability_cases.py "${{ steps.source-dir.outputs.selected }}" --output diagnostics\multi_case_discovery.md --json-output diagnostics\multi_case_discovery.json --limit 15 2>&1 | Tee-Object -FilePath diagnostics\multi-case-discovery-output.txt

      - name: Generate multi-case reference matrix
        if: steps.source-dir.outputs.selected != ''
        continue-on-error: true
        shell: pwsh
        run: |
          python samples\generate_reference_case_matrix.py "${{ steps.source-dir.outputs.selected }}" --output diagnostics\reference_case_matrix.md --json-output diagnostics\reference_case_matrix.json --finished-limit 4 --component-limit 4 --wms-only-limit 4 2>&1 | Tee-Object -FilePath diagnostics\reference-case-matrix-output.txt

      - name: Generate independent reference extraction when data is available
        if: steps.source-dir.outputs.selected != ''
        continue-on-error: true
        shell: pwsh
        run: |
          $code = "${{ github.event.inputs.code }}"
          $lot = "${{ github.event.inputs.lot }}"
          if (-not $code) { $code = "DS099903883" }
          if (-not $lot) { $lot = "105.26" }
          python samples\extract_reference_traceability.py "${{ steps.source-dir.outputs.selected }}" --code $code --lot $lot --output diagnostics\reference_traceability.md --json-output diagnostics\reference_traceability.json 2>&1 | Tee-Object -FilePath diagnostics\reference-extraction-output.txt

      - name: Compare app TraceabilityCase with independent reference
        if: steps.source-dir.outputs.selected != ''
        continue-on-error: true
        shell: pwsh
        run: |
          $code = "${{ github.event.inputs.code }}"
          $lot = "${{ github.event.inputs.lot }}"
          if (-not $code) { $code = "DS099903883" }
          if (-not $lot) { $lot = "105.26" }
          python samples\compare_traceability_reference.py "${{ steps.source-dir.outputs.selected }}" --code $code --lot $lot --output diagnostics\reference_comparison.md --json-output diagnostics\reference_comparison.json 2>&1 | Tee-Object -FilePath diagnostics\reference-comparison-output.txt

      - name: Generate real diagnostic DOCX when data is available
        if: steps.source-dir.outputs.selected != ''
        continue-on-error: true
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force diagnostics | Out-Null
          $code = "${{ github.event.inputs.code }}"
          $lot = "${{ github.event.inputs.lot }}"
          if (-not $code) { $code = "DS099903883" }
          if (-not $lot) { $lot = "105.26" }
          python -m src.report.docx_minimal "${{ steps.source-dir.outputs.selected }}" --code $code --lot $lot --output diagnostics\real_traceability_report.docx 2>&1 | Tee-Object -FilePath diagnostics\real-docx-output.txt

      - name: Generate real audit DOCX when data is available
        if: steps.source-dir.outputs.selected != ''
        continue-on-error: true
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force diagnostics | Out-Null
          $code = "${{ github.event.inputs.code }}"
          $lot = "${{ github.event.inputs.lot }}"
          if (-not $code) { $code = "DS099903883" }
          if (-not $lot) { $lot = "105.26" }
          python -m src.report.audit_docx "${{ steps.source-dir.outputs.selected }}" --code $code --lot $lot --output diagnostics\real_audit_traceability_report.docx 2>&1 | Tee-Object -FilePath diagnostics\real-audit-docx-output.txt

      - name: Generate real audit checklist DOCX when data is available
        if: steps.source-dir.outputs.selected != ''
        continue-on-error: true
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force diagnostics | Out-Null
          $code = "${{ github.event.inputs.code }}"
          $lot = "${{ github.event.inputs.lot }}"
          if (-not $code) { $code = "DS099903883" }
          if (-not $lot) { $lot = "105.26" }
          python -m src.report.audit_checklist_docx "${{ steps.source-dir.outputs.selected }}" --code $code --lot $lot --output diagnostics\real_audit_checklist_report.docx 2>&1 | Tee-Object -FilePath diagnostics\real-audit-checklist-docx-output.txt

      - name: Generate real audit checklist UI JSON when data is available
        if: steps.source-dir.outputs.selected != ''
        continue-on-error: true
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force diagnostics | Out-Null
          $code = "${{ github.event.inputs.code }}"
          $lot = "${{ github.event.inputs.lot }}"
          if (-not $code) { $code = "DS099903883" }
          if (-not $lot) { $lot = "105.26" }
          python -m src.ui.audit_checklist_json "${{ steps.source-dir.outputs.selected }}" --code $code --lot $lot --output diagnostics\real_audit_checklist_ui.json 2>&1 | Tee-Object -FilePath diagnostics\real-audit-checklist-ui-json-output.txt

      - name: Write diagnostic summary
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force diagnostics | Out-Null
          $summary = @()
          $summary += "# TraceAI Diagnostics"
          $summary += ""
          $summary += "Commit: $env:GITHUB_SHA"
          $summary += "Workflow: $env:GITHUB_WORKFLOW"
          $summary += "Code: ${{ github.event.inputs.code }}"
          $summary += "Lot: ${{ github.event.inputs.lot }}"
          $summary += ""
          $summary += "## Artifacts"
          $summary += "- pytest-output.txt"
          $summary += "- demo_traceability_report.docx"
          $summary += "- multi_case_discovery.md/json, representative cases across PRD and WMS"
          $summary += "- reference_case_matrix.md/json, selected multi-case reference outputs"
          $summary += "- reference_traceability.md/json, if extraction succeeded"
          $summary += "- reference_comparison.md/json, app vs independent reference comparison"
          $summary += "- real_traceability_report.docx, if diagnostic DOCX generation succeeded"
          $summary += "- real_audit_traceability_report.docx, if audit DOCX generation succeeded"
          $summary += "- real_audit_checklist_report.docx, if checklist audit DOCX generation succeeded"
          $summary += "- real_audit_checklist_ui.json, if checklist UI JSON generation succeeded"
          $summary += "- multi-case-discovery-output.txt"
          $summary += "- reference-case-matrix-output.txt"
          $summary += "- reference-extraction-output.txt"
          $summary += "- reference-comparison-output.txt"
          $summary += "- real-docx-output.txt"
          $summary += "- real-audit-docx-output.txt"
          $summary += "- real-audit-checklist-docx-output.txt"
          $summary += "- real-audit-checklist-ui-json-output.txt"
          $summary += "- source-directory.txt"
          $summary += "- source-files-found.txt"
          $summary += "- source-files-found-after-unzip.txt"
          $summary += ""
          $summary += "## Source data rule"
          $summary += "- trasabilitate_wms.csv OR trasabilitate_wms.zip containing trasabilitate_wms.csv"
          $summary += "- rapoarte productie.csv OR raport_productie.csv OR rapoarte_productie.csv"
          $summary += "- nomenclator.xlsx"
          $summary += "- stoc la moment original.xlsx OR stoc_la_moment_original.xlsx"
          $summary | Set-Content -Path diagnostics\diagnostic-summary.md -Encoding UTF8

      - name: Upload diagnostics artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TraceAI-Diagnostics
          path: |
            diagnostics/pytest-output.txt
            diagnostics/demo_traceability_report.docx
            diagnostics/multi_case_discovery.md
            diagnostics/multi_case_discovery.json
            diagnostics/multi-case-discovery-output.txt
            diagnostics/reference_case_matrix.md
            diagnostics/reference_case_matrix.json
            diagnostics/reference-case-matrix-output.txt
            diagnostics/reference_traceability.md
            diagnostics/reference_traceability.json
            diagnostics/reference_comparison.md
            diagnostics/reference_comparison.json
            diagnostics/reference-comparison-output.txt
            diagnostics/real_traceability_report.docx
            diagnostics/real_audit_traceability_report.docx
            diagnostics/real_audit_checklist_report.docx
            diagnostics/real_audit_checklist_ui.json
            diagnostics/reference-extraction-output.txt
            diagnostics/real-docx-output.txt
            diagnostics/real-audit-docx-output.txt
            diagnostics/real-audit-checklist-docx-output.txt
            diagnostics/real-audit-checklist-ui-json-output.txt
            diagnostics/source-directory.txt
            diagnostics/source-files-found.txt
            diagnostics/source-files-found-after-unzip.txt
            diagnostics/diagnostic-summary.md
          if-no-files-found: warn
