name: TraceAI PR Smoke

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/traceai-diagnostics.yml"
      - ".github/workflows/traceai-pr-smoke.yml"
      - "CHECKPOINT.md"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  smoke:
    name: Focused renderer smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest python-docx openpyxl pandas
          python --version

      - name: Run focused pytest
        id: pytest
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p diagnostics
          set -o pipefail
          python -m pytest -q tests/test_audit_checklist_docx.py tests/test_audit_checklist_ui_json.py 2>&1 | tee diagnostics/pytest-output.txt

      - name: Write smoke summary
        if: always()
        shell: bash
        run: |
          mkdir -p diagnostics
          {
            echo "# TraceAI PR Smoke";
            echo "";
            echo "- Runner: ubuntu-latest";
            echo "- Focused tests: tests/test_audit_checklist_docx.py tests/test_audit_checklist_ui_json.py";
            echo "- Pytest outcome: ${{ steps.pytest.outcome }}";
          } > diagnostics/diagnostic-summary.md

      - name: Upload smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TraceAI-PR-Smoke
          path: |
            diagnostics/pytest-output.txt
            diagnostics/diagnostic-summary.md
          if-no-files-found: warn

      - name: Fail if pytest failed
        if: steps.pytest.outcome != 'success'
        shell: bash
        run: |
          echo "Focused pytest failed. See diagnostics/pytest-output.txt in artifact TraceAI-PR-Smoke."
          exit 1
